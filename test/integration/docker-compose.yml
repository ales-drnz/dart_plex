# Docker stack for the dart_plex integration test suite.
#
# Bring up:    docker compose --env-file .env.test up -d
# Tear down:   docker compose down       (keeps volumes ~30s next start)
#              docker compose down -v    (wipes volumes ~5min next start)
#
# The bootstrap script (test/integration/bootstrap.dart) generates a
# fresh claim token from .env.test, exports PLEX_CLAIM, and then
# drives `docker compose up -d`. On first start Plex auto-claims
# itself to the dedicated test account, after which the claim token
# is no longer needed (the server stores its own auth token in the
# config volume).

name: dart-plex-test

services:
  plex:
    image: plexinc/pms-docker:${PLEX_IMAGE_TAG:-1.41.9.9961-aceb1e7fd}
    container_name: dart-plex-test
    ports:
      # Map host:container. Plex always listens on 32400 inside.
      - "127.0.0.1:${PLEX_HOST_PORT:-42400}:32400"
    volumes:
      # Server state: config + DB. Survives `docker compose down`;
      # wiped only by `down -v`. Host paths are gitignored.
      - ./volumes/plex/config:/config
      - ./volumes/plex/transcode:/transcode
      # Read-only media library. Populated by the bootstrap script.
      - ./seed/plex:/data:ro
    environment:
      # One-shot claim token from plex.tv. Generated by the bootstrap
      # script and exported before `docker compose up`. Plex consumes
      # it on first start and persists the resulting auth token in
      # the config volume. Subsequent starts have it empty (`""`)
      # which Plex tolerates as "already claimed, skip claim step".
      - PLEX_CLAIM=${PLEX_CLAIM:-}
      # Tell Plex the URL it should advertise to clients.
      - ADVERTISE_IP=http://127.0.0.1:${PLEX_HOST_PORT:-42400}/
      # Limit the networks Plex accepts connections from. Loopback +
      # the default Docker bridge range so the bootstrap can reach
      # the container from the host.
      - ALLOWED_NETWORKS=127.0.0.1/32,172.16.0.0/12
      - TZ=Etc/UTC
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fs http://localhost:32400/identity || exit 1"
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 60s
