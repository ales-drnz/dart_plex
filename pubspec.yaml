name: dart_plex
description: Dart client for Plex Media Server. Supports authentication, library browsing, playlists, audio streaming, lyrics, playback reporting, search and more. Targets macOS, Windows, Linux, iOS and Android.
version: 0.0.1
homepage: https://github.com/ales-drnz/dart_plex
repository: https://github.com/ales-drnz/dart_plex
issue_tracker: https://github.com/ales-drnz/dart_plex/issues

topics:
  - plex
  - media-server
  - music
  - streaming
  - api-client

screenshots:
  - description: 'The dart_plex package logo.'
    path: imgs/dart_plex.png

environment:
  sdk: ^3.5.0

dependencies:
  dio: ^5.7.0
  meta: ^1.15.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.6
  http: ^1.2.0
  yaml: ^3.1.2
